<mat-toolbar color="primary">
  <button mat-icon-button (click)="sidenav.toggle()">
    <mat-icon>menu</mat-icon>
  </button>
  <span>My Finances</span>
</mat-toolbar>

<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #sidenav
  [mode]="isMobile ? 'over' : 'side'"
  [opened]="!isMobile">
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/receitas" routerLinkActive="active">
        <mat-icon matListItemIcon>attach_money</mat-icon>
        <span matListItemTitle>Receitas</span>
      </a>
      <a mat-list-item routerLink="/despesas" routerLinkActive="active">
        <mat-icon matListItemIcon>payments</mat-icon>
        <span matListItemTitle>Despesas</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <div class="main-container">
      <router-outlet />
    </div>
  </mat-sidenav-content>

</mat-sidenav-container>
